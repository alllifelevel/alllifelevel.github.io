<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALLStudio AI | Work in Progress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0a0a0a;
            color: #f0f0f0;
            overflow: hidden;
        }
        
        .gradient-text {
            background: linear-gradient(90deg, #00d1ff 0%, #ff00e6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .circuit-board {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 209, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 209, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            opacity: 0.3;
        }
        
        .processing-bar {
            height: 4px;
            background: linear-gradient(90deg, #00d1ff 0%, #ff00e6 100%);
            position: relative;
            overflow: hidden;
        }
        
        .processing-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
            animation: processing 2.5s infinite;
        }
        
        @keyframes processing {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }
        
        .code-block {
            font-family: monospace;
            background: rgba(20, 20, 20, 0.7);
            border-left: 3px solid #00d1ff;
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }
        
        .code-block::before {
            content: '>';
            position: absolute;
            left: 8px;
            color: #ff00e6;
        }
        
        .blinking-cursor {
            animation: blink 1s step-end infinite;
        }
        
        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }
        
        .floating {
            animation: floating 6s ease-in-out infinite;
        }
        
        @keyframes floating {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
            100% {
                transform: translateY(0px);
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    <!-- Circuit Board Background -->
    <div class="circuit-board"></div>
    
    <!-- Main Content -->
    <div class="z-10 text-center px-6 max-w-4xl mx-auto">
        <!-- Logo -->
        <div class="mb-12 floating">
            <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-gradient-to-br from-blue-500 to-purple-600">
                <i class="fas fa-cog fa-spin text-4xl text-white"></i>
            </div>
        </div>
        
        <!-- Heading -->
        <h1 class="text-5xl md:text-7xl font-bold mb-6 gradient-text">
            ALLStudio<span class="text-white">AI</span>
        </h1>
        
        <!-- Status -->
        <div class="mb-12">
            <div class="processing-bar mb-4"></div>
            <p class="text-xl md:text-2xl text-gray-300 mb-2">
                System Initialization in Progress
            </p>
            <p class="text-gray-500">
                Current status: <span class="text-blue-400">Training neural networks</span>
            </p>
        </div>
        
        <!-- Code Block -->
        <div class="code-block text-left text-gray-300 mb-12 font-mono text-sm md:text-base">
            <div class="pl-6">
                <div>> Initializing ALLStudio AI v1.0.0</div>
                <div>> Loading core modules...</div>
                <div class="text-green-400">✓ Data pipeline established</div>
                <div class="text-green-400">✓ Model architecture compiled</div>
                <div>> Training generative networks <span class="blinking-cursor">█</span></div>
            </div>
        </div>
        
        <!-- Progress Indicator -->
        <div class="max-w-md mx-auto">
            <div class="flex items-center justify-between mb-2 text-gray-400 text-sm">
                <span>System Resources</span>
                <span>78% allocated</span>
            </div>
            <div class="w-full bg-gray-800 rounded-full h-2.5">
                <div class="bg-gradient-to-r from-blue-500 to-purple-600 h-2.5 rounded-full" style="width: 78%"></div>
            </div>
        </div>
    </div>

    <!-- Floating AI Elements -->
    <div class="absolute bottom-8 left-8 text-gray-600">
        <i class="fas fa-microchip text-3xl opacity-30"></i>
    </div>
    <div class="absolute top-8 right-8 text-gray-600">
        <i class="fas fa-brain text-3xl opacity-30"></i>
    </div>
    <div class="absolute top-1/3 left-1/4 text-gray-600">
        <i class="fas fa-project-diagram text-2xl opacity-20"></i>
    </div>
    <div class="absolute bottom-1/4 right-1/3 text-gray-600">
        <i class="fas fa-atom text-2xl opacity-20"></i>
    </div>
</body>
</html>
